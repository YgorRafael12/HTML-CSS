<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebra de linhas</h1>
    <hr>
    <p>Você pode escrever um parágrafo de 
        qualquer jeito, desde que você de qualquer
        desde que você o coloque entre as tags &lt;p&gt; e &lt;/p.&gt;
    </p>
    <hr>
    <p>
        Se você precisar quebra o texto 
        em algum local em específico,<br>
        basta utilizar a tag &lt;br&gt;. <!--Less Than / Greater Than-->
    </p>
</body>
</html>
